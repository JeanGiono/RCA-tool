<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube 課程筆記生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .prose h1 { color: #1e40af; border-bottom: 2px solid #e5e7eb; padding-bottom: 0.5rem; margin-bottom: 1.5rem; }
        .prose h3 { color: #2563eb; margin-top: 2rem; }
        .prose blockquote { border-left: 5px solid #3b82f6; background: #eff6ff; padding: 1rem 1.5rem; border-radius: 0.5rem; font-style: normal; color: #1e3a8a; }
        .prose ul { list-style-type: disc; padding-left: 1.5rem; }
        .loading-dots:after { content: '.'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } 80%, 100% { content: ''; } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 leading-relaxed">

<div class="max-w-4xl mx-auto px-4 py-12">
    <!-- Header -->
    <header class="text-center mb-10">
        <h1 class="text-4xl font-black text-blue-900 mb-3">🎓 YouTube 課程筆記生成器</h1>
        <p class="text-gray-500 text-lg">透過 AI 快速將逐字稿轉化為精華筆記</p>
    </header>

    <!-- App Container -->
    <div class="bg-white rounded-3xl shadow-2xl border border-gray-100 overflow-hidden">
        <!-- Settings Section -->
        <div class="p-6 bg-gray-50 border-b border-gray-100">
            <label class="block text-sm font-bold text-gray-700 mb-2">Gemini API Key</label>
            <input type="password" id="apiKeyInput" placeholder="在此輸入您的 API Key" 
                class="w-full px-4 py-2 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition text-sm">
        </div>

        <!-- Input Section -->
        <div class="p-8">
            <label class="block text-sm font-bold text-gray-700 mb-2">影片逐字稿內容</label>
            <textarea id="transcriptInput" placeholder="請在此貼上從 YouTube 導出的逐字稿..." 
                class="w-full h-64 px-5 py-4 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition resize-none mb-6"></textarea>
            
            <button onclick="handleGeneration()" id="actionBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-200 transition-all flex items-center justify-center gap-3">
                <span id="btnText">開始生成筆記</span>
                <div id="spinner" class="hidden w-5 h-5 border-3 border-white border-t-transparent rounded-full animate-spin"></div>
            </button>
        </div>

        <!-- Output Section -->
        <div id="resultSection" class="hidden p-8 border-t border-gray-100 bg-white">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-bold text-gray-900">✨ 生成結果</h2>
                <div class="flex gap-2">
                    <button onclick="copyMarkdown()" class="px-4 py-2 text-sm bg-gray-100 hover:bg-gray-200 rounded-lg transition text-gray-600 font-medium">複製內容</button>
                    <button onclick="window.print()" class="px-4 py-2 text-sm bg-blue-50 hover:bg-blue-100 rounded-lg transition text-blue-600 font-medium">列印/PDF</button>
                </div>
            </div>
            <div id="renderOutput" class="prose prose-blue max-w-none"></div>
        </div>
    </div>

    <footer class="mt-8 text-center text-gray-400 text-sm">
        專為 GitHub Pages 部署優化 | 採用 Gemini 2.5 Flash 模型
    </footer>
</div>

<!-- Simple Toast Message -->
<div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-3 bg-gray-900 text-white rounded-full shadow-xl opacity-0 transition-opacity pointer-events-none"></div>

<script>
    // 預填你提供的 Key (僅供本地測試，部署至 GitHub 前建議清空讓使用者自行輸入)
    const DEFAULT_KEY = ""; 
    let currentMarkdown = "";

    document.addEventListener('DOMContentLoaded', () => {
        const savedKey = localStorage.getItem('yt_note_api_key');
        const keyInput = document.getElementById('apiKeyInput');
        if (savedKey) {
            keyInput.value = savedKey;
        } else if (DEFAULT_KEY) {
            keyInput.value = DEFAULT_KEY;
        }
    });

    async function handleGeneration() {
        const apiKey = document.getElementById('apiKeyInput').value.trim();
        const transcript = document.getElementById('transcriptInput').value.trim();
        
        if (!apiKey) return showToast("請輸入 API Key");
        if (!transcript) return showToast("請提供逐字稿內容");

        localStorage.setItem('yt_note_api_key', apiKey);

        const btn = document.getElementById('actionBtn');
        const btnText = document.getElementById('btnText');
        const spinner = document.getElementById('spinner');
        const resultSection = document.getElementById('resultSection');

        // UI 鎖定
        btn.disabled = true;
        btnText.innerText = "正在分析逐字稿";
        btnText.classList.add('loading-dots');
        spinner.classList.remove('hidden');

        try {
            const result = await callGeminiAPI(apiKey, transcript);
            currentMarkdown = result;
            document.getElementById('renderOutput').innerHTML = marked.parse(result);
            resultSection.classList.remove('hidden');
            resultSection.scrollIntoView({ behavior: 'smooth' });
        } catch (error) {
            showToast("錯誤: " + error.message);
        } finally {
            btn.disabled = false;
            btnText.innerText = "開始生成筆記";
            btnText.classList.remove('loading-dots');
            spinner.classList.add('hidden');
        }
    }

    async function callGeminiAPI(key, text) {
        const systemPrompt = `角色：你是一位專業的課程設計師與知識管理專家。
任務：根據提供的 YouTube 逐字稿生成結構化課程筆記。
要求：
- 課程標題：使用 <h1>。
- 核心摘要：用一段話放在 <blockquote>。
- 章節重點：使用 <h3>，包含關鍵概念(清單)與深度解析。
- 行動清單：最後提供 3 個實作建議。
- 語言：台灣繁體中文。`;

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${key}`;
        
        const response = await fetchWithRetry(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: `逐字稿：\n${text}` }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            })
        });

        return response.candidates[0].content.parts[0].text;
    }

    async function fetchWithRetry(url, options, retries = 5) {
        let delay = 1000;
        for (let i = 0; i < retries; i++) {
            const resp = await fetch(url, options);
            if (resp.ok) return await resp.json();
            if (resp.status !== 429 && resp.status < 500) {
                const err = await resp.json();
                throw new Error(err.error?.message || "請求失敗");
            }
            await new Promise(r => setTimeout(r, delay));
            delay *= 2;
        }
        throw new Error("超過重試次數");
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.classList.replace('opacity-0', 'opacity-100');
        setTimeout(() => toast.classList.replace('opacity-100', 'opacity-0'), 3000);
    }

    function copyMarkdown() {
        const el = document.createElement('textarea');
        el.value = currentMarkdown;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        showToast("已複製到剪貼簿！");
    }
</script>

</body>
</html>
